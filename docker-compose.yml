services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5080:8080"
    volumes:
      - ./backend/Data:/app/Data
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Data Source=/app/Data/avalia.db

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:5080
    ports:
      - "5173:80"
    depends_on:
      - api
